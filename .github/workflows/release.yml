name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          zip -r "windows-cis-benchmark-${VERSION}.zip" \
            config/ \
            scripts/ \
            src/ \
            LICENSE \
            README.md \
            CLAUDE.md \
            -x '*.DS_Store'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: windows-cis-benchmark-*.zip
          generate_release_notes: true
